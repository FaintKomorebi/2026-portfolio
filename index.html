<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noah Schilling, Product Designer</title>
<meta name="description" content="Noah Schilling, product designer based in Milwaukee, Wisconsin.">
<style>
  @font-face {
    font-family: 'SF Pro Display';
    src: url('assets/fonts/SF-Pro-Display-Light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'SF Pro Display';
    src: url('assets/fonts/SF-Pro-Display-Regular.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'SF Pro Display';
    src: url('assets/fonts/SF-Pro-Display-RegularItalic.otf') format('opentype');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: 'SF Pro Display';
    src: url('assets/fonts/SF-Pro-Display-Medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --ink:   #111113;
    --mid:   #6e6e73;
    --soft:  #b9b9be;
    --faint: #d6d6db;
    --hair:  #ececf0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: var(--ink);
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    font-weight: 400;
    min-height: 100svh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: inherit; text-decoration: none; }

  /* name · fixed top left */
  .site-name {
    position: fixed;
    top: clamp(24px, 4vh, 40px);
    left: clamp(24px, 4vw, 48px);
    font-size: 14px;
    font-style: italic;
    font-weight: 400;
    color: var(--mid);
    letter-spacing: 0.01em;
    z-index: 10;
  }

  /* page · content lives in the right half */
  .page {
    min-height: 100svh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
  }

  .content {
    grid-column: 2;
    padding: clamp(96px, 14vh, 160px) clamp(32px, 6vw, 96px) clamp(72px, 10vh, 120px) clamp(8px, 2vw, 32px);
  }

  .intro {
    font-size: clamp(17px, 1.7vw, 19px);
    font-weight: 400;
    line-height: 1.55;
    max-width: 30ch;
    margin-bottom: clamp(44px, 7vh, 72px);
  }

  /* two column index */
  .index {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(40px, 5vw, 72px);
  }

  .col h2 {
    font-size: 14px;
    font-weight: 400;
    color: var(--soft);
    margin-bottom: 14px;
  }

  .col ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .col li {
    font-size: 15px;
    line-height: 1.45;
    color: var(--mid);
  }

  .col a, .col button {
    display: inline-block;
    transition: color 0.18s ease;
  }

  .col a:hover, .col button:hover { color: var(--ink); }

  .col button {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    padding: 0;
  }

  .muted { color: var(--faint); }

  /* info popup */
  .overlay {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.7);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.22s ease, visibility 0.22s ease;
    z-index: 20;
  }

  .overlay.open { opacity: 1; visibility: visible; }

  .card {
    background: #ffffff;
    border: 1px solid var(--hair);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(17, 17, 19, 0.07);
    padding: 30px 36px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transform: translateY(6px);
    transition: transform 0.22s ease;
  }

  .overlay.open .card { transform: none; }

  .card a {
    font-size: 15px;
    color: var(--mid);
    transition: color 0.18s ease;
  }

  .card a:hover { color: var(--ink); }

  /* single pass on load */
  .rise {
    opacity: 0;
    transform: translateY(10px);
    animation: rise 0.46s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  .rise.d1 { animation-delay: 0.12s; }

  @keyframes rise {
    to { opacity: 1; transform: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .rise { animation: none; opacity: 1; transform: none; }
    .overlay, .card { transition: none; }
  }

  /* mobile */
  @media (max-width: 860px) {
    .page { grid-template-columns: 1fr; align-items: start; }
    .content {
      grid-column: 1;
      padding: clamp(110px, 18vh, 150px) clamp(24px, 6vw, 48px) 80px;
    }
  }
</style>
</head>
<body>

<span class="site-name">Noah Schilling</span>

<main class="page">
  <div class="content">

    <p class="intro rise">Hi, I'm Noah. A product designer based in Milwaukee, Wisconsin.</p>

    <div class="index rise d1">
      <section class="col">
        <h2>Successes</h2>
        <ul>
          <li><a href="cs-acro.html">Legacy turned modern website</a></li>
          <li><a href="cs-sharepoint.html">How we find anything now</a></li>
          <li class="muted">The Taylor Swift problem</li>
        </ul>
      </section>
      <section class="col">
        <h2>Contact</h2>
        <ul>
          <li><a href="resources/Noah_Schilling_Product_Design.pdf" target="_blank" rel="noopener">Resume</a></li>
          <li><button id="info-btn" type="button" aria-haspopup="dialog">Info</button></li>
        </ul>
      </section>
    </div>

  </div>
</main>

<div class="overlay" id="overlay" aria-hidden="true">
  <div class="card" role="dialog" aria-label="Contact information">
    <a href="mailto:nschillingdesign@gmail.com">nschillingdesign@gmail.com</a>
    <a href="https://linkedin.com/in/noah-schilling" target="_blank" rel="noopener">LinkedIn</a>
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const infoBtn = document.getElementById('info-btn');

  infoBtn.addEventListener('click', () => {
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
  });

  function closeOverlay() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeOverlay();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeOverlay();
  });
</script>

</body>
</html>
